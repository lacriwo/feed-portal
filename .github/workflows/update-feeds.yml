name: Update All Feeds

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
  push:
    paths:
      - "data/projects.json"
      - "scripts/update_all_feeds.py"
      - ".github/workflows/update-feeds.yml"

permissions:
  contents: write

jobs:
  update-feeds:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate feeds
        run: python scripts/update_all_feeds.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feeds data/state.json
          if git diff --staged --quiet; then
            echo "No feed changes"
          else
            git commit -m "Update generated feeds"
            git push origin HEAD:${{ github.ref_name }}
          fi
